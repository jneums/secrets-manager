submission:
  name: Secrets Manager
  description: A vetKey-encrypted, per-principal secret vault on the Internet Computer. Every value is encrypted at rest using ICP's threshold key derivation — no single node can ever read your secrets.
  publisher: Jesse
  category: Utilities
  deployment_type: global
  repo_url: https://github.com/jneums/secrets-manager
  mcp_path: /mcp
  why_this_app: Every agent needs a place to store API keys and tokens. Secrets Manager is the first MCP server to use ICP vetKeys for encryption at rest — your secrets are encrypted using threshold-derived keys that no single subnet node ever sees. Per-principal isolation, zero external dependencies, fully on-chain.
  key_features:
    - vetKey encryption at rest — every secret is encrypted using ICP's threshold key derivation protocol, no node ever sees your plaintext
    - Per-principal key isolation — each identity gets a unique encryption key derived from their principal
    - Transparent encryption — just call set_secret and get_secret, the canister handles all cryptography
    - Labels for organizing secrets — tag and filter your keys
    - Upsert semantics — set_secret creates or updates seamlessly
    - Metadata inspection without exposing values — list and check secrets safely
    - Idempotent delete — safe to call on non-existent keys
  tags: [secrets, key-value, vetkeys, encryption, security, agent-tools, vault]
